name: Mirror Codex App Installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag. Defaults to codex-app-YYYYMMDD-HHMMSS.
        required: false
        type: string
      force_release:
        description: Publish even when the latest release already matches current sources.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

env:
  R2_BUCKET_NAME: codex-app-mirror
  R2_PUBLIC_BASE_URL: https://codexapp.agentsmirror.com

concurrency:
  group: codex-app-mirror
  cancel-in-progress: false

jobs:
  probe:
    name: Probe current versions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.probe.outputs.should_release }}
      release_tag: ${{ steps.probe.outputs.release_tag }}
      latest_tag: ${{ steps.probe.outputs.latest_tag }}
      skip_reason: ${{ steps.probe.outputs.skip_reason }}
      version_summary: ${{ steps.probe.outputs.version_summary }}
      manifest: ${{ steps.probe.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Probe sources
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FORCE_RELEASE: ${{ inputs.force_release || 'false' }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: bash scripts/probe-release.sh

  macos:
    name: Download macOS installers
    runs-on: macos-latest
    needs: probe
    if: needs.probe.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download macOS DMGs
        run: bash scripts/download-macos.sh dist/macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: codex-macos
          path: dist/macos/*
          if-no-files-found: error

  windows:
    name: Download Windows installer
    runs-on: windows-latest
    needs: probe
    if: needs.probe.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows MSIX
        shell: pwsh
        run: ./scripts/download-windows.ps1 -OutDir dist/windows

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-windows
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    if: needs.probe.outputs.should_release == 'true'
    needs:
      - probe
      - macos
      - windows
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.probe.outputs.release_tag }}"
          {
            echo "tag=$tag"
            echo "title=Codex App Mirror ${tag#codex-app-}"
          } >> "$GITHUB_OUTPUT"

          cat > release-manifest.json <<'JSON'
          ${{ needs.probe.outputs.manifest }}
          JSON

          find artifacts -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

          windows_package="$(jq -r '.sources.windows.packageMoniker' release-manifest.json)"
          mac_arm_etag="$(jq -r '.sources.macos.arm64.etag' release-manifest.json)"
          mac_x64_etag="$(jq -r '.sources.macos.x64.etag' release-manifest.json)"

          {
            echo "Official Codex desktop app installer mirror."
            echo
            echo "Detected versions:"
            echo "- Windows: ${windows_package}"
            echo "- macOS arm64 ETag: ${mac_arm_etag}"
            echo "- macOS x64 ETag: ${mac_x64_etag}"
            echo
            echo "Sources:"
            echo "- Windows: Microsoft Store ProductId 9PLM9XGG6VKS via DisplayCatalog/FE3 metadata"
            echo "- macOS arm64: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg"
            echo "- macOS x64: https://persistent.oaistatic.com/codex-app-prod/Codex-latest-x64.dmg"
            echo
            echo "R2 mirror:"
            echo "- Versioned objects: ${R2_PUBLIC_BASE_URL}/${tag}/<asset-name>"
            echo "- Latest objects: ${R2_PUBLIC_BASE_URL}/latest/<asset-name>"
            echo "- Apple Silicon Mac: ${R2_PUBLIC_BASE_URL}/latest/mac-arm64"
            echo "- Intel Mac: ${R2_PUBLIC_BASE_URL}/latest/mac-intel"
            echo "- Windows x64: ${R2_PUBLIC_BASE_URL}/latest/win"
            echo
            echo "Checksums are attached in SHA256SUMS.txt. The probe manifest is attached in release-manifest.json."
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file release-notes.md \
            artifacts/codex-macos/* \
            artifacts/codex-windows/* \
            release-manifest.json \
            SHA256SUMS.txt

      - name: Ensure AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Sync GitHub Release assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_S3_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        shell: bash
        run: |
          set -euo pipefail
          files=(
            artifacts/codex-macos/*
            artifacts/codex-windows/*
            release-manifest.json
            SHA256SUMS.txt
          )
          bash scripts/sync-r2.sh "$R2_BUCKET_NAME" "${{ steps.meta.outputs.tag }}" "${files[@]}"
          bash scripts/sync-r2.sh "$R2_BUCKET_NAME" latest "${files[@]}"

          mac_arm64="artifacts/codex-macos/Codex-mac-arm64.dmg"
          mac_intel="artifacts/codex-macos/Codex-mac-x64.dmg"
          win_msix="$(find artifacts/codex-windows -maxdepth 1 -type f \( -name '*.Msix' -o -name '*.msix' \) | sort | head -n 1)"

          test -f "$mac_arm64"
          test -f "$mac_intel"
          test -f "$win_msix"

          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/mac-arm64 "$mac_arm64" Codex-mac-arm64.dmg
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/mac-intel "$mac_intel" Codex-mac-intel.dmg
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/win "$win_msix" Codex-Windows-x64.msix
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/checksums SHA256SUMS.txt SHA256SUMS.txt
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/manifest release-manifest.json release-manifest.json

  no_changes:
    name: No new version
    runs-on: ubuntu-latest
    needs: probe
    if: needs.probe.outputs.should_release != 'true'
    steps:
      - name: Report current state
        run: |
          echo "No new Codex app version detected."
          echo "${{ needs.probe.outputs.skip_reason }}"
          echo "${{ needs.probe.outputs.version_summary }}"
