name: Mirror Codex App Installers

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag. Defaults to a version-derived tag.
        required: false
        type: string
      force_release:
        description: Publish even when the latest release already matches current sources.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read

env:
  R2_BUCKET_NAME: codex-app-mirror
  R2_PUBLIC_BASE_URL: https://codexapp.agentsmirror.com

concurrency:
  group: codex-app-mirror
  cancel-in-progress: false

jobs:
  probe:
    name: Probe current versions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.probe.outputs.should_release }}
      release_tag: ${{ steps.probe.outputs.release_tag }}
      latest_tag: ${{ steps.probe.outputs.latest_tag }}
      skip_reason: ${{ steps.probe.outputs.skip_reason }}
      version_summary: ${{ steps.probe.outputs.version_summary }}
      manifest: ${{ steps.probe.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Probe sources
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FORCE_RELEASE: ${{ inputs.force_release || 'false' }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: bash scripts/probe-release.sh

  macos:
    name: Download macOS installers
    runs-on: macos-latest
    needs: probe
    if: needs.probe.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download macOS DMGs
        shell: bash
        run: |
          set -euo pipefail
          cat > probe-manifest.json <<'JSON'
          ${{ needs.probe.outputs.manifest }}
          JSON

          bash scripts/download-macos.sh dist/macos probe-manifest.json

      - name: Read macOS app metadata
        run: bash scripts/read-macos-metadata.sh dist/macos/macos-metadata.json dist/macos/Codex-mac-arm64.dmg dist/macos/Codex-mac-x64.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: codex-macos
          path: dist/macos/*
          if-no-files-found: error

  windows:
    name: Download Windows installer
    runs-on: windows-latest
    needs: probe
    if: needs.probe.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download Windows MSIX
        shell: pwsh
        run: |
          @'
          ${{ needs.probe.outputs.manifest }}
          '@ | Set-Content -Encoding utf8 -Path probe-manifest.json

          ./scripts/download-windows.ps1 -OutDir dist/windows -ManifestPath probe-manifest.json

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-windows
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    if: needs.probe.outputs.should_release == 'true'
    permissions:
      contents: write
    needs:
      - probe
      - macos
      - windows
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          cat > probe-manifest.json <<'JSON'
          ${{ needs.probe.outputs.manifest }}
          JSON

          bash scripts/prepare-release-metadata.sh \
            probe-manifest.json \
            artifacts/codex-macos/macos-metadata.json \
            artifacts \
            "$R2_PUBLIC_BASE_URL" \
            "${{ needs.probe.outputs.release_tag }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file release-notes.md \
            artifacts/codex-macos/Codex-mac-arm64.dmg \
            artifacts/codex-macos/Codex-mac-x64.dmg \
            artifacts/codex-macos/SHA256SUMS-macos.txt \
            artifacts/codex-windows/* \
            release-manifest.json \
            SHA256SUMS.txt

      - name: Ensure AWS CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Sync GitHub Release assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_S3_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        shell: bash
        run: |
          set -euo pipefail
          mac_arm64="artifacts/codex-macos/Codex-mac-arm64.dmg"
          mac_intel="artifacts/codex-macos/Codex-mac-x64.dmg"
          win_msix="$(find artifacts/codex-windows -maxdepth 1 -type f \( -name '*.Msix' -o -name '*.msix' \) | sort | head -n 1)"

          test -f "$mac_arm64"
          test -f "$mac_intel"
          test -f "$win_msix"

          staging_prefix="staging/${{ steps.meta.outputs.tag }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup_staging() {
            bash scripts/clear-r2-prefix.sh "$R2_BUCKET_NAME" "$staging_prefix" || true
          }
          trap cleanup_staging EXIT

          upload_aliases() {
            local prefix="$1"
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/mac-arm64" "$mac_arm64" Codex-mac-arm64.dmg
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/mac-intel" "$mac_intel" Codex-mac-intel.dmg
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/win" "$win_msix" Codex-Windows-x64.msix
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/checksums" SHA256SUMS.txt SHA256SUMS.txt
            bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" "$prefix/manifest" release-manifest.json release-manifest.json
          }

          upload_aliases "$staging_prefix"
          aws s3 cp "s3://$R2_BUCKET_NAME/$staging_prefix/manifest" /tmp/r2-staging-manifest.json \
            --endpoint-url "$R2_S3_ENDPOINT" \
            --region "${AWS_DEFAULT_REGION:-auto}" \
            --no-progress
          cmp release-manifest.json /tmp/r2-staging-manifest.json

          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/mac-arm64 "$mac_arm64" Codex-mac-arm64.dmg
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/mac-intel "$mac_intel" Codex-mac-intel.dmg
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/win "$win_msix" Codex-Windows-x64.msix
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/checksums SHA256SUMS.txt SHA256SUMS.txt
          bash scripts/sync-r2.sh --object "$R2_BUCKET_NAME" latest/manifest release-manifest.json release-manifest.json

          curl -fsSL --retry 5 --retry-delay 2 "$R2_PUBLIC_BASE_URL/latest/manifest?run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" -o /tmp/r2-public-manifest.json
          cmp release-manifest.json /tmp/r2-public-manifest.json

  no_changes:
    name: No new version
    runs-on: ubuntu-latest
    needs: probe
    if: needs.probe.outputs.should_release != 'true'
    steps:
      - name: Report current state
        run: |
          echo "No new Codex app version detected."
          echo "${{ needs.probe.outputs.skip_reason }}"
          echo "${{ needs.probe.outputs.version_summary }}"
