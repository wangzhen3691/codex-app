name: Sync All Historical Releases
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync Historical Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "1. 正在获取原仓库的所有 Release 信息..."
          # 使用 json 格式精确提取 tagName 和 name，避免空格和特殊字符错乱
          gh release list --repo Wangnov/codex-app-mirror --limit 100 --json tagName,name | jq -c '.[]' | while read -r row; do
            tag=$(echo "$row" | jq -r '.tagName')
            title=$(echo "$row" | jq -r '.name')
            
            echo "-----------------------------------"
            echo "正在处理版本: $tag (标题: $title) ..."
            
            # 2. 如果你自己的仓库里还没有这个标签，就开始搬运
            if ! gh release view "$tag" >/dev/null 2>&1; then
              echo "检测到新版本 $tag，正在下载原安装包..."
              mkdir -p dist
              gh release download "$tag" --repo Wangnov/codex-app-mirror --dir dist
              
              echo "正在创建并上传到你的仓库..."
              gh release create "$tag" dist/* --title "$title" --notes "同步自原仓库历史版本 $tag"
              rm -rf dist
            else
              echo "版本 $tag 已存在，跳过。"
            fi
          done
